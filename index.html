<head>
  <meta charset="UTF-8">

  <!-- CSS (UNCHANGED PATHS) -->
  <link rel="stylesheet" href="CSS/style.css">
  <link rel="stylesheet" href="CSS/layout.css">
  <link rel="stylesheet" href="CSS/CardNav.css">

  <!-- SEO -->
  <meta name="description" content="Vyatirikht - Cinematic storytelling through motion. Films, visuals, and creative direction.">

  <!-- Preconnect -->
  <link rel="preconnect" href="https://www.youtube.com">
  <link rel="preconnect" href="https://www.google.com">
  <link rel="preconnect" href="https://i.ytimg.com">
</head>

<body class="landing">

  <!-- NAV -->
  <div class="card-nav-container">
    <nav class="card-nav" id="mainCardNav">

      <div class="card-nav-top">
        <a href="index.html" class="card-nav-logo">
          <img src="assets/images/1.png" alt="CineTorqueFilms Logo">
        </a>

        <a href="index.html" class="card-nav-home" style="display: none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
        </a>

        <div class="card-nav-hamburger" id="cardNavToggle">
          <div class="line"></div>
          <div class="line"></div>
        </div>
      </div>

      <div class="card-nav-content" id="cardNavContent">

        <!-- WORK -->
        <div class="nav-card" style="background-color: #2a2a2a; color: #fff;">
          <div class="nav-card-label">Work</div>
          <div class="nav-card-links">
            <a href="portfolio.html" class="nav-card-link">Portfolio</a>
            <a href="blog.html" class="nav-card-link">Blog</a>
            <a href="blog.html" class="nav-card-link">Movies</a>
          </div>
        </div>

        <!-- LEARN -->
        <div class="nav-card" style="background-color: #333; color: #fff;">
          <div class="nav-card-label">Learn</div>
          <div class="nav-card-links">
            <a href="tutorials.html" class="nav-card-link">Tutorials</a>
            <a href="camera-simulator.html" class="nav-card-link">Simulator</a>
            <a href="storyboard.html" class="nav-card-link">Storyboard</a>
          </div>
        </div>

        <!-- COMMUNITY -->
        <div class="nav-card" style="background-color: #d4af37; color: #000;">
          <div class="nav-card-label">Community</div>
          <div class="nav-card-links">
            <a href="about.html" class="nav-card-link">About Us</a>
            <a href="faq.html" class="nav-card-link">FAQ</a>
            <a href="contact.html" class="nav-card-link">Contact</a>
          </div>
        </div>

      </div>
    </nav>
  </div>

  <!-- BACKGROUND VIDEO (OPTIMIZED LAZY LOAD) -->
  <div class="background-video" id="videoContainer">

    <!-- Thumbnail loads instantly -->
    <img 
      src="https://img.youtube.com/vi/UJa80UPjREU/hqdefault.jpg" 
      class="yt-thumb"
      id="videoThumbnail"
      alt="Background video thumbnail"
    >

  </div>

  <!-- SINGLE OVERLAY -->
  <div class="overlay"></div>

  <!-- CENTER CONTENT -->
  <div class="center-logo">
    <h1>Vyatirikht</h1>
    <p>Cinematic storytelling through motion</p>

    <div class="buttons">
      <a href="portfolio.html">Portfolio</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>

  <!-- GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

  <!-- JS (UNCHANGED PATHS) -->
  <script src="JS/SplitText.js"></script>
  <script src="JS/script.js"></script>

  <!-- INLINE PERFORMANCE + ANIMATION -->
  <script>
    // Lazy load YouTube video
    const container = document.getElementById("videoContainer");
    let loaded = false;

    function loadVideo() {
      if (loaded) return;

      const iframe = document.createElement("iframe");
      iframe.src = "https://www.youtube.com/embed/UJa80UPjREU?autoplay=1&mute=1&loop=1&playlist=UJa80UPjREU&controls=0&modestbranding=1&playsinline=1";
      iframe.frameBorder = "0";
      iframe.allow = "autoplay; fullscreen";

      container.appendChild(iframe);
      loaded = true;
    }

    setTimeout(loadVideo, 1500);

    // Cinematic intro animation
    gsap.from(".center-logo h1", {
      y: 80,
      opacity: 0,
      duration: 1.2,
      ease: "power4.out"
    });

    gsap.from(".center-logo p", {
      y: 40,
      opacity: 0,
      duration: 1,
      delay: 0.4,
      ease: "power3.out"
    });

    gsap.from(".buttons a", {
      y: 30,
      opacity: 0,
      duration: 0.8,
      delay: 0.8,
      stagger: 0.2
    });
  </script>

</body>
</html>
