<!DOCTYPE html>
<html>
<head>
  <title>Vyatirikht</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0a;
      color: white;
    }

    .nav {
      padding: 20px;
      text-align: center;
      font-size: 20px;
      letter-spacing: 3px;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: 40px;
    }

    .products {
      padding: 20px;
    }

    .card {
      background: #111;
      padding: 15px;
      margin: 20px 0;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: white;
      color: black;
      text-decoration: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="nav">VYATIRIKHT</div>

<div class="hero">
  <h1>Not for everyone.</h1>
  <p>Built different. Worn different.</p>
</div>

<div class="products">

  <div class="card">
    <h2>Black Tee #01</h2>
    <p>₹799</p>
    <a class="btn" href="#">Buy Now</a>
  </div>

  <div class="card">
    <h2>White Tee #02</h2>
    <p>₹799</p>
    <a class="btn" href="#">Buy Now</a>
  </div>

</div>

</body>
</html>
